kind = "web"
previewPath = "/"
title = "Colour Scheme Explorer"
version = "1.0.0"
id = "artifacts/colour-explorer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20101

[services.development]
run = "pnpm --filter @workspace/colour-explorer run dev"

[services.production]
build = ["pnpm", "--filter", "@workspace/colour-explorer", "run", "build"]
publicDir = "artifacts/colour-explorer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20101"
BASE_PATH = "/"
