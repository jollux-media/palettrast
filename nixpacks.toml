# Railway uses Nixpacks to build this monorepo.
# Install pnpm 11 globally (Corepack + Node 24 fails in Railway's builder).
[variables]
NODE_VERSION = "24"

[phases.install]
cmds = ["npm install -g pnpm@11.3.0 && pnpm install --frozen-lockfile"]

[phases.build]
cmds = ["pnpm run railway:build"]

[start]
cmd = "pnpm run railway:start"
